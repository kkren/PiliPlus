name: Build

on:
    push:
        branches:
            - main
        tags:
            - "v*"
        paths-ignore:
            - "**.md"
    pull_request:
        types:
            - opened
            - synchronize
            - reopened
            - ready_for_review
        paths-ignore:
            - "**.md"
    workflow_dispatch:
        inputs:
            tag:
                description: "tag"
                required: false
                default: ""
                type: string

jobs:
    android:
        if: ${{ github.event_name == 'push' || github.event_name == 'pull_request' || github.event_name == 'workflow_dispatch' }}
        name: Release Android
        runs-on: ubuntu-latest
        permissions: write-all

        steps:
            - name: 代码迁出
              uses: actions/checkout@v7
              with:
                  fetch-depth: 0

            - name: 构建Java环境
              uses: actions/setup-java@v5
              with:
                  distribution: "zulu"
                  java-version: "17"
                  cache: "gradle"
                  cache-dependency-path: |
                      android/*.gradle*
                      android/**/gradle-wrapper.properties

            - name: 安装Flutter
              uses: subosito/flutter-action@v2
              id: flutter-action
              with:
                  channel: stable
                  flutter-version-file: pubspec.yaml
                  cache: true

            - name: Apply Patch
              shell: pwsh
              run: lib/scripts/patch.ps1 android

            - name: Require signing key for release tags
              if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
              shell: bash
              env:
                  SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
              run: |
                  if [ -z "$SIGN_KEYSTORE_BASE64" ]; then
                    echo "::error::SIGN_KEYSTORE_BASE64 is required for release-tag builds"
                    exit 1
                  fi

            - name: Write key
              if: github.event_name != 'pull_request'
              shell: bash
              env:
                  SIGN_KEYSTORE_BASE64: ${{ secrets.SIGN_KEYSTORE_BASE64 }}
                  KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
                  KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
                  KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
              run: |
                  if [ -n "$SIGN_KEYSTORE_BASE64" ]; then
                    printf '%s' "$SIGN_KEYSTORE_BASE64" | base64 --decode > android/app/key.jks
                    {
                      echo "storeFile=key.jks"
                      printf 'storePassword=%s\n' "$KEYSTORE_PASSWORD"
                      printf 'keyAlias=%s\n' "$KEY_ALIAS"
                      printf 'keyPassword=%s\n' "$KEY_PASSWORD"
                    } > android/key.properties
                  fi

            - name: Set and Extract version
              shell: pwsh
              run: lib/scripts/build.ps1 android

            - name: Flutter Build Release Apk
              if: ${{ github.event_name != 'pull_request' }}
              run: flutter build apk --release --split-per-abi --dart-define-from-file=pili_release.json --pub

            - name: Flutter Build Dev Apk
              if: ${{ github.event_name == 'pull_request' }}
              run: |
                  flutter build apk --release --split-per-abi --android-project-arg dev=1 --dart-define-from-file=pili_release.json --pub

            - name: Rename
              run: |
                  for file in build/app/outputs/flutter-apk/app-*-release.apk; do
                    abi=$(echo "$file" | sed -E 's|.*app-(.*)-release\.apk|\1|')
                    mv "$file" "PiliPlus_android_${{ env.version }}_${abi}.apk"
                  done
              shell: bash

            - name: Release
              if: ${{ startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '') }}
              uses: softprops/action-gh-release@v3
              with:
                  tag_name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
                  name: ${{ github.event_name == 'workflow_dispatch' && github.event.inputs.tag || github.ref_name }}
                  files: PiliPlus_android_*.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_arm64-v8a
                  path: PiliPlus_android_*_arm64-v8a.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_armeabi-v7a
                  path: PiliPlus_android_*_armeabi-v7a.apk

            - name: 上传
              uses: actions/upload-artifact@v7
              with:
                  archive: false
                  name: Android_x86_64
                  path: PiliPlus_android_*_x86_64.apk
